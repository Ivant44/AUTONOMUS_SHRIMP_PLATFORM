    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    default_nav_to_pose_bt_xml: "$(find-pkg-share shrimp_modu)/config/navigate_to_pose_ackermann.xml"
    default_nav_through_poses_bt_xml: "$(find-pkg-share shrimp_modu)/config/navigate_through_poses_ackermann.xml"
    bt_loop_duration: 50
    default_server_timeout: 5000
    wait_for_service_timeout: 5000
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_compute_route_bt_node
      - nav2_compute_and_track_route_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_get_pose_from_path_action_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_smoother_selector_bt_node
      - nav2_progress_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    current_goal_checker: general_goal_checker
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 45.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 3.14

    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 70
      model_dt: 0.1
      batch_size: 700
      vx_std: 0.03
      vy_std: 0.0
      wz_std: 0.75
      vx_max: 0.055
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.80
      iteration_count: 1
      prune_distance: 2.0
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: Ackermann
      visualize: false
      retry_attempt_limit: 1
      AckermannConstraints:
        min_turning_r: 0.20
      critics:
        - ConstraintCritic
        - ObstaclesCritic
        - GoalCritic
        - PathAlignCritic
        - PathFollowCritic
        - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 18.0
        threshold_to_consider: 4.0
      GoalAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 2.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.08
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 2
        threshold_to_consider: 4.0
        offset_from_furthest: 8
        use_path_orientations: false
      PathAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 3.5
        offset_from_furthest: 8
        max_angle_to_furthest: 1.0
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 36.0
        offset_from_furthest: 8
        threshold_to_consider: 4.0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.28
      plugins:
        - voxel_layer
        - inflation_layer
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        mark_threshold: 0
        unknown_threshold: 15
        footprint_clearing_enabled: true
        observation_sources: depth_points
        depth_points:
          topic: /stereo/points
          max_obstacle_height: 1.5
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: PointCloud2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15
          observation_persistence: 0.15
          expected_update_rate: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.5
        inflation_radius: 0.38
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0
      publish_frequency: 1.0
      rolling_window: false
      width: 40
      height: 40
      resolution: 0.10
      origin_x: -20.0
      origin_y: -20.0
      robot_radius: 0.28
      track_unknown_space: false
      plugins:
        - obstacle_layer
        - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan depth_points
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
        depth_points:
          topic: /stereo/points
          max_obstacle_height: 1.5
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: PointCloud2
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15
          observation_persistence: 0.35
          expected_update_rate: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.5
        inflation_radius: 0.42
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 250000
      max_on_approach_iterations: 1000
      max_planning_time: 2.5
      motion_model_for_search: DUBIN
      minimum_turning_radius: 0.20
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.1
      cost_penalty: 2.0
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      lookup_table_size: 10.0
      angle_quantization_bins: 48
      smooth_path: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [drive_on_heading, assisted_teleop, wait]
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.1
    rotational_acc_lim: 0.8

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.08, 0.0, 0.60]
    min_velocity: [-0.10, 0.0, -0.60]
    max_accel: [0.20, 0.0, 0.80]
    max_decel: [-0.20, 0.0, -0.80]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
